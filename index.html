<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Getnet - Módulo II</title>
    <style>
        /* Estilos globais e estrutura do corpo */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Área do Cabeçalho (Fundo esverdeado) */
        header {
            background-color: #2e8b8b; /* Tom esverdeado/azul-petróleo */
            color: white;
            padding: 20px;
            display: flex;
            align-items: flex-end; /* Alinha os elementos pela base */
            position: relative;
        }

        /* Bloco Azul no Cabeçalho como Imagem */
        .header-icon-blue {
            width: 80px;  
            height: 80px; 
            object-fit: cover; /* Mantém a proporção da imagem sem distorcer */
            margin-right: 20px; /* Espaço entre o bloco e o texto GETNET */
            flex-shrink: 0;
        }

        /* Texto no topo superior direito */
        .header-top-right {
            position: absolute;
            top: 15px;
            right: 20px;
            text-align: right;
        }

        .header-year {
            font-size: 1.5em;
            letter-spacing: 1px;
        }

        /* Texto grande 'GETNET' */
        .getnet-logo {
            font-size: 3.8em;
            font-weight: lighter;
            letter-spacing: 5px;
            margin-right: 20px;
            line-height: 1;
        }

        /* Texto 'MÓDULO II' ao lado do GETNET */
        .getnet-modulo {
            font-size: 1.8em;
            font-weight: lighter;
            letter-spacing: 2px;
            margin-bottom: 5px; /* Ajuste fino de alinhamento com a base */
        }

        /* Área Central Branca */
        main {
            background-color: white;
            padding: 40px;
            display: flex;
            justify-content: center; 
            flex-grow: 1; /* Empurra o rodapé para o final da página */
        }

        /* Coluna que segura os blocos dos grupos */
        .groups-column {
            display: flex;
            flex-direction: column;
            gap: 30px; /* Espaço vertical entre as linhas */
            max-width: 600px;
            width: 100%;
        }

        /* Linha individual de cada grupo */
        .group-row {
            display: flex;
            align-items: center;
            gap: 20px; /* Espaço entre o retângulo verde e o texto */
        }

        /* Imagens dos blocos verdes */
        .green-block {
            width: 220px; /* Largura aproximada da imagem */
            height: 120px; /* Altura aproximada da imagem */
            object-fit: cover; /* Mantém a proporção da imagem sem distorcer */
            flex-shrink: 0;
        }

        /* Texto dos grupos */
        .group-text {
            font-size: 2.2em;
            font-weight: normal;
            text-transform: uppercase;
        }

        /* Rodapé Preto */
        footer {
            background-color: black;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px 0;
            text-transform: uppercase;
            text-align: center;
            font-size: 1.1em;
            letter-spacing: 1px;
        }

        /* Quadrados azuis do rodapé */
        .footer-icon-blue {
            width: 30px;
            height: 30px;
            background-color: blue;
            margin: 0 15px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top-right">
            <span class="header-year">TODOS OS ANOS2026</span>
        </div>

        <img src="https://i.postimg.cc/NMLbV6Tt/Getnet2.png" class="header-icon-blue" alt="Getnet">

        <div class="getnet-logo">GETNET</div>
        
        <div class="getnet-modulo">MÓDULO II</div>
    </header>

    <main>
        <div class="groups-column">
            <div class="group-row">
                <img src="https://i.postimg.cc/R0fW4L38/GRUPO-A.png" class="green-block" alt="Imagem Grupo A">
                <div class="group-text">GRUPO A</div>
            </div>

            <div class="group-row">
                <img src="https://i.postimg.cc/zGxjT50X/GRUPO-B.png" class="green-block" alt="Imagem Grupo B">
                <div class="group-text">GRUPO B</div>
            </div>

            <div class="group-row">
                <img src="https://i.postimg.cc/mDCKSx7Q/GRUPO-C.png" class="green-block" alt="Imagem Grupo C">
                <div class="group-text">GRUPO C</div>
            </div>

            <div class="group-row">
                <img src="https://i.postimg.cc/13zh1jZS/GRUPO-D.png" class="green-block" alt="Imagem Grupo D">
                <div class="group-text">DIA DA ATUALIZAÇÃO</div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-icon-blue"></div>
        <div>
            SOMENTE ACOMPANHANDO<br>
            MÓDULO II
        </div>
        <div class="footer-icon-blue"></div>
    </footer>

</body>
</html>
